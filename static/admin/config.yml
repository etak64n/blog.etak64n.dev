# Sveltia CMS 設定 — etak64n's blog (Zola)
# docs: https://sveltiacms.app/en/docs/
#
# 記事は content/articles/{Category}/{slug}/index.md の page bundle 構成。
# 画像は各記事フォルダに co-located でアップロードされる (media_folder: '')。
# frontmatter は Zola 互換の TOML (+++)。

backend:
  name: github
  repo: etak64n/blog.etak64n.dev
  branch: main
  # OAuth Worker は使わず、ログイン時に GitHub Personal Access Token を貼る運用。
  # (base_url を設定すれば OAuth ログインに切り替え可能。README 参照。)

# 日本語 UI
locale: ja

# グローバルなメディア既定値 (ヒーロー画像のアップロード先など)。
# 各記事の本文画像はコレクション側の media_folder: '' で co-located になる。
media_folder: static/images/uploads
public_folder: /images/uploads

# 記事の slug は日本語タイトルでも安全になるよう調整
slug:
  encoding: ascii
  clean_accents: true

collections:

  - name: ai
    label: "AI"
    label_singular: "AI の記事"
    folder: content/articles/AI
    path: "{{slug}}/index"
    extension: md
    format: toml-frontmatter
    media_folder: ""
    public_folder: ""
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [date, updated, title]
    fields:
      - { name: title, label: タイトル, widget: string }
      - { name: date, label: 公開日, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: updated, label: 更新日, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { name: draft, label: 下書き, widget: boolean, default: true }
      - name: taxonomies
        label: 分類
        widget: object
        fields:
          - { name: categories, label: カテゴリ, widget: list, default: ["AI"] }
          - { name: tags, label: タグ, widget: list, required: false, default: [] }
      - { name: math, label: "数式 (KaTeX)", widget: boolean, default: false }
      - name: extra
        label: Extra
        widget: object
        fields:
          - { name: author, label: 著者, widget: string, default: "etak64n" }
          - { name: hero, label: ヒーロー画像パス, widget: string, default: "/images/hero/placeholder.svg" }
          - { name: toc, label: 目次, widget: boolean, default: true }
      - { name: body, label: 本文, widget: markdown }

